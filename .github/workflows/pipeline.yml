name: Anime Song Pipeline

permissions:
  contents: write

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes
  workflow_dispatch: {}      # allows manual trigger from the Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Deno (needed by yt-dlp for YouTube signature solving)
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

      - name: Install Python deps
        run: pip install yt-dlp requests

      - name: Write YouTube cookies file
        working-directory: pipeline
        run: echo "${{ secrets.YT_COOKIES_B64 }}" | base64 -d > cookies.txt

      - name: Run pipeline
        working-directory: pipeline
        env:
          PIPELINE_BOT_TOKEN: ${{ secrets.PIPELINE_BOT_TOKEN }}
          STORAGE_CHAT_ID: ${{ secrets.STORAGE_CHAT_ID }}
          PUBLIC_CHANNEL_ID: ${{ secrets.PUBLIC_CHANNEL_ID }}
          DELIVERY_BOT_USERNAME: ${{ secrets.DELIVERY_BOT_USERNAME }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python main.py

      - name: Commit updated posted.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pipeline/posted.json
          git diff --staged --quiet || git commit -m "Update posted log [skip ci]"
          git pull --rebase origin main
          git push
